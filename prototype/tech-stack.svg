<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg { fill: #f7f2ea; }
      .card { fill: #fff9f2; stroke: #e2d6c9; stroke-width: 2; rx: 18; }
      .title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #1f1b16; }
      .text { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #3f3a34; }
      .muted { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #6d655b; }
      .line { stroke: #3a6ea5; stroke-width: 3; marker-end: url(#arrow); }
      .accent { fill: #d94f2a; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#3a6ea5" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="700" />

  <text x="60" y="60" class="title">TruthLens Tech Stack & Architecture</text>
  <text x="60" y="90" class="muted">Prototype flow for misinformation detection with live news lookup</text>

  <rect class="card" x="60" y="130" width="330" height="170" />
  <text x="90" y="170" class="title">Frontend</text>
  <text x="90" y="200" class="text">HTML / CSS / JS</text>
  <text x="90" y="230" class="text">Claim input + UI</text>
  <text x="90" y="260" class="text">Results + news list</text>

  <rect class="card" x="460" y="120" width="340" height="190" />
  <text x="490" y="160" class="title">Local NLP Engine</text>
  <text x="490" y="190" class="text">Tokenization + TF-IDF</text>
  <text x="490" y="220" class="text">Heuristic patterns</text>
  <text x="490" y="250" class="text">Misinformation score</text>

  <rect class="card" x="860" y="130" width="300" height="170" />
  <text x="890" y="170" class="title">Verified Claims</text>
  <text x="890" y="200" class="text">JSON dataset</text>
  <text x="890" y="230" class="text">Topic-based matches</text>

  <rect class="card" x="200" y="390" width="340" height="180" />
  <text x="230" y="430" class="title">Node.js Server</text>
  <text x="230" y="460" class="text">API proxy</text>
  <text x="230" y="490" class="text">Secures API key</text>
  <text x="230" y="520" class="text">/api/news endpoint</text>

  <rect class="card" x="680" y="390" width="370" height="180" />
  <text x="710" y="430" class="title">NewsDataHub API</text>
  <text x="710" y="460" class="text">Free tier news search</text>
  <text x="710" y="490" class="text">Current news matches</text>
  <text x="710" y="520" class="text">Similarity filter</text>

  <line class="line" x1="390" y1="215" x2="460" y2="215" />
  <line class="line" x1="800" y1="215" x2="860" y2="215" />
  <line class="line" x1="250" y1="300" x2="250" y2="390" />
  <line class="line" x1="540" y1="480" x2="680" y2="480" />
  <line class="line" x1="390" y1="215" x2="250" y2="390" />
  <line class="line" x1="540" y1="300" x2="540" y2="390" />

  <circle cx="390" cy="215" r="5" class="accent" />
  <circle cx="460" cy="215" r="5" class="accent" />
  <circle cx="800" cy="215" r="5" class="accent" />
  <circle cx="860" cy="215" r="5" class="accent" />
  <circle cx="250" cy="390" r="5" class="accent" />
  <circle cx="540" cy="390" r="5" class="accent" />
</svg>
